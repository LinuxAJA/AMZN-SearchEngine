<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparador Inteligente — ShopNova</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary-dark: #1e293b;
      --accent-orange: #f59e0b;
      --price-red: #b91c1c;
      --rating-stars: #f59e0b;
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-sans antialiased min-h-screen flex flex-col">

  <header class="w-full bg-[#0f1e2d] text-white shadow-md">
    <div class="container mx-auto flex h-14 items-center justify-between px-6 max-w-7xl">
      <div class="flex items-center gap-6">
        <span class="font-bold text-lg tracking-tight text-white flex items-center gap-2">
          <span class="text-[#f59e0b]">📦</span> ShopNova
        </span>
        <a href="index.html" 
           class="inline-flex items-center gap-1.5 text-xs text-slate-300 hover:text-white transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Volver a la tienda
        </a>
      </div>

      <span class="bg-amber-500/10 text-[#f59e0b] text-xs font-semibold px-3 py-1 rounded border border-amber-500/20 flex items-center gap-1.5">
        🏆 Modo comparación
      </span>
    </div>
  </header>

  <section class="w-full bg-gradient-to-r from-[#112536] to-[#1a3a54] text-white py-10 px-6">
    <div class="container mx-auto max-w-7xl flex flex-col md:flex-row md:items-center justify-between gap-6">
      <div>
        <span class="bg-[#f59e0b] text-slate-900 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded">
          Comparador inteligente
        </span>
        <h2 class="text-3xl font-bold tracking-tight mt-2">Compara hasta 4 productos de la misma categoría.</h2>
        <p class="text-sm text-slate-300 mt-1">
          Mira precio, valoración, características y utilidades en una sola tabla para decidir con claridad.
        </p>
      </div>

      <div class="flex items-center gap-3 bg-white/5 p-3 rounded-lg border border-white/10 shrink-0">
        <label for="selector-productos-categoria" class="text-xs font-medium text-slate-300 whitespace-nowrap">
          Categoría:
        </label>
        <select id="selector-productos-categoria" 
                class="bg-white text-slate-900 text-xs rounded px-3 py-2 font-medium focus:outline-none min-w-[200px] cursor-pointer">
          <option value="" disabled selected>Cargando opciones...</option>
        </select>
      </div>
    </div>
  </section>

  <div class="container mx-auto flex-1 p-6 max-w-7xl">
    
    <div id="loadingSpinnerComparar" class="hidden flex justify-center items-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-amber-500"></div>
    </div>

    <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-x-auto">
      <table class="w-full table-fixed min-w-[800px] border-collapse text-left text-sm">
        <tbody id="tabla-matriz-contenido">
          </tbody>
      </table>
    </div>

  </div>

  <footer class="bg-[#1f3446] text-[#fafafa] py-6 text-center text-sm border-t border-white/10 mt-auto">
    <p>&copy; 2026 AMZN - SearchEngine. Todos los derechos reservados.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="models/Rating.js"></script>
  <script src="models/Category.js"></script>
  <script src="models/Product.js"></script>

 
  <script src="js/comparar.js"></script>

</body>
</html>
