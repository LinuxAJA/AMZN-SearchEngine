<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />

  <title>AMZN - SearchEngine</title>
</head>

<body class="flex min-h-dvh flex-col bg-background text-foreground">
  <header class="bg-[var(--nav)] text-[var(--nav-foreground)] sticky top-0 z-40">
    <div class="flex items-center gap-2 px-3 py-2 md:gap-4 md:px-6">
      <a href="/" class="flex items-center gap-1.5 font-display font-bold text-lg shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-package text-[var(--cta)]" aria-hidden="true">
          <path
            d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z">
          </path>
          <path d="M12 22V12"></path>
          <polyline points="3.29 7 12 12 20.71 7"></polyline>
          <path d="m7.5 4.27 9 5.15"></path>
        </svg>
        <span class="text-white">AMZN-<span class="text-[var(--cta)]">SearchEngine</span></span>
      </a>

      <form id="searchForm" class="flex-1 flex rounded-md overflow-hidden ring-2 ring-transparent focus-within:ring-[var(--cta)]">
        <input type="text" id="searchInput"
          class="flex w-full border-input px-3 py-1 text-base shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 md:text-sm flex-1 h-10 rounded-none border-0 bg-white text-foreground focus-visible:ring-0"
          placeholder="Busca productos, marcas y más…" />

        <button type="submit" aria-label="Buscar"
          class="bg-[var(--cta)] text-[var(--cta-foreground)] px-4 grid place-items-center hover:brightness-95">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-search" aria-hidden="true">
            <path d="m21 21-4.34-4.34"></path>
            <circle cx="11" cy="11" r="8"></circle>
          </svg>
        </button>
      </form>

      <a href="comparar.html"
        class="hidden md:flex flex-col items-start text-xs hover:ring-1 hover:ring-white/40 rounded-sm px-2 py-1">
        <span class="text-[10px] text-white/70">Decide mejor</span>
        <span class="font-semibold flex items-center gap-1 text-white text-[15px]">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-scale" aria-hidden="true">
            <path d="M12 3v18"></path>
            <path d="m19 8 3 8a5 5 0 0 1-6 0zV7"></path>
            <path d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"></path>
            <path d="m5 8 3 8a5 5 0 0 1-6 0zV7"></path>
            <path d="M7 21h10"></path>
          </svg>
          Comparar
        </span>
      </a>
    </div>

    <nav class="bg-[var(--nav-sub)] text-[var(--nav-foreground)] px-4 py-2 flex items-center justify-between text-sm shadow-md">
      <div id="topNavCategories" class="flex items-center space-x-2 overflow-x-auto scrollbar-none">
        <button data-category="all" class="flex items-center space-x-1 hover:bg-white/10 px-3 py-1.5 rounded transition font-sans cursor-pointer bg-white/20 font-semibold">
          <span>Todo</span>
        </button>
        <button data-category="electronics" class="hover:bg-white/10 px-3 py-1.5 rounded transition font-sans">Electrónica</button>
        <button data-category="jewelery" class="hover:bg-white/10 px-3 py-1.5 rounded transition font-sans">Joyería</button>
        <button data-category="men's clothing" class="hover:bg-white/10 px-3 py-1.5 rounded transition font-sans">Ropa de Hombre</button>
        <button data-category="women's clothing" class="hover:bg-white/10 px-3 py-1.5 rounded transition font-sans">Ropa de Mujer</button>
      </div>
    </nav>
  </header>

  <section class="relative bg-gradient-to-r from-[oklch(0.32_0.04_245)] to-[oklch(0.45_0.05_220)] text-white">
    <div class="px-4 md:px-8 py-8 md:py-14 max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <div class="inline-flex items-center rounded-md px-2.5 py-0.5 text-xs font-semibold bg-[var(--cta)] text-[var(--cta-foreground)] border-0 mb-3 shadow">
          Ofertas de la Semana
        </div>
        <h1 class="font-display text-3xl md:text-5xl font-bold leading-tight max-w-2xl">
          Descubre Productos Increíbles con Envío Rápido
        </h1>
        <p class="mt-3 text-white/80 max-w-xl">
          Filtros inteligentes, reseñas verificadas y precios transparentes. Diseñado pensando en ti.
        </p>
      </div>
    </div>
  </section>

  <div class="flex-1 px-3 md:px-6 py-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-6">
    
    <aside class="space-y-6 lg:sticky lg:top-[112px] lg:self-start lg:col-span-1">
      <div class="rounded-lg border bg-card p-4">
        <h3 class="font-semibold mb-3">Categorías</h3>
        <div id="asideCategories" class="flex flex-col gap-1 text-sm">
          <button data-category="all" class="text-left px-2 py-1.5 rounded-md transition-colors bg-secondary font-semibold text-[var(--price)]">Todo</button>
          <button data-category="electronics" class="text-left px-2 py-1.5 rounded-md transition-colors hover:bg-secondary/60 text-muted-foreground">Electrónica</button>
          <button data-category="jewelery" class="text-left px-2 py-1.5 rounded-md transition-colors hover:bg-secondary/60 text-muted-foreground">Joyería</button>
          <button data-category="men's clothing" class="text-left px-2 py-1.5 rounded-md transition-colors hover:bg-secondary/60 text-muted-foreground">Ropa de Hombre</button>
          <button data-category="women's clothing" class="text-left px-2 py-1.5 rounded-md transition-colors hover:bg-secondary/60 text-muted-foreground">Ropa de Mujer</button>
        </div>
      </div>

      <div class="rounded-lg border bg-card p-4">
        <h3 class="font-semibold mb-3">Precio Máximo</h3>
        <div class="relative flex items-center my-3">
          <input type="range" id="priceRange" min="0" max="1000" value="1000"
            class="w-full h-1 rounded-full bg-primary accent-primary appearance-none cursor-pointer" />
        </div>
        <div class="flex justify-between text-xs text-muted-foreground">
          <span>$0</span>
          <span id="priceValue">$1000</span>
        </div>
      </div>
    </aside>

    <main class="flex flex-col gap-6">
      <div id="status" class="text-sm font-medium text-muted-foreground hidden"></div>

      <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        </div>

      <div id="loadingSpinner" class="flex justify-center items-center py-6 hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-[var(--nav-sub)] border-t-[var(--cta)]"></div>
      </div>

      <div class="flex justify-center mt-4">
        <button id="loadMoreButton" class="bg-[var(--primary)] text-white hover:brightness-110 font-semibold px-6 py-2.5 rounded-md shadow transition-all duration-200 hidden">
          Ver más productos
        </button>
      </div>
    </main>
  </div>

  <footer class="bg-[#1f3446] text-[#fafafa] py-6 text-center text-sm border-t border-white/10 mt-auto">
    <p>&copy; 2026 AMZN - SearchEngine. Todos los derechos reservados.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
